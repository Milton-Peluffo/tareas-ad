<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${isEdit ? 'Editar Tarea' : 'Nueva Tarea'}">Formulario de Tarea</title>
    <link rel="stylesheet" href="/css/task-form.css">
</head>
<body>
    <div class="container">
        <a href="/tasks" class="back-link">« Volver a la lista de tareas</a>
        
        <div class="header">
            <h1 th:text="${isEdit ? 'Editar Tarea' : 'Nueva Tarea'}">Formulario de Tarea</h1>
        </div>

        <!-- Mensajes de éxito/error -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="${isEdit ? '/tasks/update/' + task.id : '/tasks/save'}" 
              th:object="${task}" 
              method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nombre">Nombre de la Tarea:</label>
                <input type="text" 
                       id="nombre" 
                       th:field="*{nombre}" 
                       placeholder="Ingrese el nombre de la tarea" 
                       required />
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" 
                          th:field="*{descripcion}" 
                          placeholder="Ingrese una descripción detallada"></textarea>
            </div>

            <div class="form-group">
                <label for="estado">Estado:</label>
                <select id="estado" th:field="*{estado}">
                    <option value="PENDIENTE">Pendiente</option>
                    <option value="FINALIZADO">Finalizado</option>
                </select>
            </div>

            <div class="form-group" th:if="${!isEdit}">
                <label>Creado por:</label>
                <input type="text" 
                       th:value="${currentUser}" 
                       readonly 
                       style="background-color: #f8f9fa;" />
            </div>

            <div class="buttons">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${isEdit ? 'Actualizar Tarea' : 'Crear Tarea'}">Guardar</span>
                </button>
                <a href="/tasks" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</body>
</html>
